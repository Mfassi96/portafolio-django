{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-5 ">
        {% if project.image %}
        <img src="{{ project.image.url }}" class="card-img-top " alt="{{ project.title }}" style="height: 220px; object-fit: cover;">
        {% endif %}
        <h2 class="display-5 fw-bold mt-5">{{ project.title }}</h2>
        <p class="text-muted fs-4">{{ project.description }}</p>
    </div>
</div>
{% endblock %}
